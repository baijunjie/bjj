name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'packages/nuxt-layer-shadcn-ui/**'
      - 'packages/nuxt-layer-effect/**'
      - 'packages/shared/**'
      - 'packages/nuxt-layer-shadcn-ui/.playground/.storybook/**'
      - 'packages/nuxt-layer-effect/.playground/.storybook/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-storybook.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build @bjj/shared
        run: pnpm --filter @bjj/shared build

      - name: Build nuxt-layer-shadcn-ui Storybook
        env:
          STORYBOOK_BASE_PATH: /bjj/nuxt-layer-shadcn-ui/storybook/
        run: pnpm --filter @bjj/nuxt-layer-shadcn-ui storybook:build

      - name: Build nuxt-layer-effect Storybook
        env:
          STORYBOOK_BASE_PATH: /bjj/nuxt-layer-effect/storybook/
        run: pnpm --filter @bjj/nuxt-layer-effect storybook:build

      - name: Assemble site
        run: |
          mkdir -p _site/nuxt-layer-shadcn-ui _site/nuxt-layer-effect
          cp -r packages/nuxt-layer-shadcn-ui/.playground/storybook-static _site/nuxt-layer-shadcn-ui/storybook
          cp -r packages/nuxt-layer-effect/.playground/storybook-static _site/nuxt-layer-effect/storybook

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4