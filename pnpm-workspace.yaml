packages:
  - packages/*

# Shared dependency versions referenced via the `catalog:` protocol from
# package.json files. Use this for any library declared in more than one
# package, so versions stay in sync across the workspace.
#
# `catalog:` is resolved by pnpm install. For published artifacts (where npm
# itself does not understand the protocol), `scripts/publish.ts` expands
# `catalog:` references in dependencies / peerDependencies / optionalDependencies
# to the literal range below when staging package.json — so peerDeps can use
# `catalog:` too and the version is maintained in one place.
catalog:
  '@nuxt/eslint': ^1.15.2
  '@storybook-vue/nuxt': 9.1.0-29411911.f34c865
  '@storybook/addon-docs': ^10.3.5
  '@storybook/vue3': ~9.1.0
  '@tailwindcss/postcss': ^4.2.4
  storybook: ^10.3.5
  tailwindcss: ^4.2.4